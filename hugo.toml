baseURL = "https://testowytestblog.github.io/moj-pierwszy-blog/"
title = "Mój Blog IT"
theme = "PaperMod"
defaultContentLanguage = "pl"
paginate = 10
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]

# 🔥 Globalne parametry dla PaperMod
[params]
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowShareButtons = true
  ShowToc = true
  ShowRecentPosts = true
  disableSpecial1stPost = true
  pluralizeListTitles = false
  mainSections = ["programowanie", "ai", "testowanie"]

# 🌐 Konfiguracja językowa
[languages]
  [languages.pl]
    languageName = "Polski"
    weight = 1
    title = "Mój Blog IT"
    
    # 1. Główne parametry języka PL
    [languages.pl.params]
      showSearchButton = true

    # 2. Włączenie i parametry Profile Mode (Poprawny blok)
    [languages.pl.params.profileMode]
      enabled = true
      title = "Twoje Imię & Nazwisko"
      subtitle = "Software Engineer / Pasjonat AI"

    # 3. Konfiguracja wyszukiwarki dla języka PL
    [languages.pl.params.search]
      enable = true
      title = "Wyszukiwarka"
      placeholder = "Szukaj postów..."

    # Menu
    [[languages.pl.menu.main]]
      name = "Start"
      url = "/"
      weight = 1

    [[languages.pl.menu.main]]
      name = "Programowanie"
      url = "programowanie/"
      weight = 2

    [[languages.pl.menu.main]]
      name = "AI"
      url = "ai/"
      weight = 3

    [[languages.pl.menu.main]]
      name = "Testowanie"
      url = "testowanie/"
      weight = 4

    [[languages.pl.menu.main]]
      name = "Szukaj 🔍"
      url = "search/"
      weight = 50

# ⚙️ Markdown rendering
[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
