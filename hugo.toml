baseURL = "https://testowytestblog.github.io/moj-pierwszy-blog/"
title = "Mój Blog IT"
theme = "PaperMod"
defaultContentLanguage = "pl"
paginate = 10
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]

# 🔥 Globalne parametry dla PaperMod
[params]
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowShareButtons = true
  ShowToc = true
  ShowRecentPosts = true
  disableSpecial1stPost = true
  pluralizeListTitles = false
  mainSections = ["programowanie", "ai", "testowanie"]

# 🏷️ Taxonomie
[taxonomies]
  category = "categories"
  tag = "tags"

# 🌐 Konfiguracja językowa (Tutaj lądują parametry menu i wyszukiwarki!)
[languages]
  [languages.pl]
    languageName = "Polski"
    weight = 1
    title = "Mój Blog IT"
    
    # Przycisk lupy w menu dla języka polskiego
    [languages.pl.params]
      showSearchButton = true

    # Konfiguracja wyszukiwarki dla języka polskiego
    [languages.pl.params.search]
      enable = true
      title = "Wyszukiwarka"
      placeholder = "Szukaj postów..."

    # Menu dopasowane do podfolderu baseURL
    [[languages.pl.menu.main]]
      name = "Start"
      url = "/"
      weight = 1

    [[languages.pl.menu.main]]
      name = "Programowanie"
      url = "programowanie/"
      weight = 2

    [[languages.pl.menu.main]]
      name = "AI"
      url = "ai/"
      weight = 3

    [[languages.pl.menu.main]]
      name = "Testowanie"
      url = "testowanie/"
      weight = 4

    # Dodatkowy, bezpieczny link tekstowy do wyszukiwarki w menu
    [[languages.pl.menu.main]]
      name = "Szukaj 🔍"
      url = "search/"
      weight = 50

# ⚙️ Markdown rendering
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    style = "dracula"
    lineNos = true# sekcje które mają się pojawiać jako "blog feed"
  mainSections = ["programowanie", "ai", "testowanie"]

# 🏷️ taxonomie (tagi i kategorie)
[taxonomies]
  category = "categories"
  tag = "tags"

# 🌐 język (POPRAWIONE dla Hugo 0.163+)
[languages]
  [languages.pl]
    languageName = "Polski"
    weight = 1
    title = "Mój Blog IT"

# 🧭 (opcjonalne menu)
[[menu.main]]
  name = "Start"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Programowanie"
  url = "/programowanie/"
  weight = 2

[[menu.main]]
  name = "AI"
  url = "/ai/"
  weight = 3

[[menu.main]]
  name = "Testowanie"
  url = "/testowanie/"
  weight = 4

# ⚙️ markdown rendering
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    style = "dracula"
    lineNos = true
