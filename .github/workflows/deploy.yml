name: Deploy Hugo site

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Install PaperMod theme
        run: |
          mkdir -p themes
          rm -rf themes/PaperMod
          git clone --depth 1 https://github.com/adityatelange/hugo-PaperMod themes/PaperMod

      - name: Verify theme exists
        run: ls -la themes/PaperMod

      - name: Build site
        run: hugo --minify --cleanDestinationDir --verbose

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
