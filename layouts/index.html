{{ define "main" }}
<h1>{{ .Site.Title }}</h1>
<div class="search-box">
  <input id="searchInput" type="text" placeholder="Szukaj..." />
  <ul id="results"></ul>
</div>
<h2>Posty</h2>
{{ range first 10 .Site.RegularPages }}
  <article>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </article>
{{ end }}
{{ end }}
