<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<div class="search-box">
  <input id="searchInput" type="text" placeholder="Szukaj artykułów..." />
  <ul id="results"></ul>
</div>

<script>
let fuse = null;
let data = [];

fetch("/moj-pierwszy-blog/index.json")
  .then(res => {
    if (!res.ok) throw new Error("Brak index.json");
    return res.json();
  })
  .then(json => {
    data = json;

    fuse = new Fuse(data, {
      keys: ["title", "content", "summary"],
      threshold: 0.3
    });
  })
  .catch(err => console.error("Search error:", err));


document.getElementById("searchInput").addEventListener("input", (e) => {
  const q = e.target.value;

  if (!q || !fuse) {
    document.getElementById("results").innerHTML = "";
    return;
  }

  const results = fuse.search(q);

  document.getElementById("results").innerHTML =
    results.map(r =>
      `<li><a href="${r.item.permalink}">${r.item.title}</a></li>`
    ).join("");
});
</script>
