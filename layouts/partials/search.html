<script>
let fuse = null;

fetch("/moj-pierwszy-blog/index.json")
  .then(r => r.json())
  .then(data => {
    fuse = new Fuse(data, {
      keys: ["title", "content", "summary"],
      threshold: 0.3
    });
  });

document.getElementById("searchInput").addEventListener("input", (e) => {
  const q = e.target.value;

  if (!q || !fuse) {
    document.getElementById("results").innerHTML = "";
    return;
  }

  const results = fuse.search(q);

  document.getElementById("results").innerHTML =
    results.map(r =>
      `<li><a href="${r.item.permalink}">${r.item.title}</a></li>`
    ).join("");
});
</script>
