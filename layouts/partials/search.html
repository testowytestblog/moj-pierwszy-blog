<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<input id="searchInput" placeholder="Szukaj..." />
<ul id="results"></ul>

<script>
let fuse;

fetch("/moj-pierwszy-blog/index.json")
  .then(r => r.json())
  .then(data => {
    fuse = new Fuse(data, {
      keys: ["title", "content", "summary"],
      threshold: 0.3
    });
  });

document.addEventListener("input", (e) => {
  if (e.target.id !== "searchInput") return;

  if (!fuse) return;

  const res = fuse.search(e.target.value);

  document.getElementById("results").innerHTML =
    res.map(r => `<li><a href="${r.item.permalink}">${r.item.title}</a></li>`).join("");
});
</script>
